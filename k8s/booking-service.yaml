apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  labels:
    app: booking-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: livepass/booking-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: APP_NAME
              value: LivePass Booking Service
            - name: ENVIRONMENT
              value: development
            - name: DEBUG
              value: "false"
            - name: EVENT_SERVICE_URL
              value: http://event-service:8000
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672/
            - name: BOOKING_QUEUE
              value: booking_queue
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  labels:
    app: booking-service
spec:
  type: NodePort
  selector:
    app: booking-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30082
