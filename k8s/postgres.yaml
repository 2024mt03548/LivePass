apiVersion: v1
kind: ConfigMap
metadata:
  name: event-postgres-init
  labels:
    app: event-postgres
data:
  01_schema_seed.sql: |
    DO $$
    BEGIN
        IF NOT EXISTS (SELECT 1 FROM pg_type WHERE typname = 'event_status') THEN
            CREATE TYPE event_status AS ENUM ('ACTIVE', 'CANCELLED', 'SOLD_OUT');
        END IF;
    END
    $$;

    CREATE TABLE IF NOT EXISTS events (
        id SERIAL PRIMARY KEY,
        name VARCHAR(255) NOT NULL,
        venue VARCHAR(255) NOT NULL,
        event_date TIMESTAMP WITH TIME ZONE NOT NULL,
        price DOUBLE PRECISION NOT NULL CHECK (price >= 0),
        available_seats INTEGER NOT NULL CHECK (available_seats >= 0),
        status event_status NOT NULL DEFAULT 'ACTIVE',
        created_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT CURRENT_TIMESTAMP
    );

    CREATE INDEX IF NOT EXISTS ix_events_name ON events (name);
    CREATE INDEX IF NOT EXISTS ix_events_event_date ON events (event_date);
    CREATE INDEX IF NOT EXISTS ix_events_status ON events (status);

    INSERT INTO events (id, name, venue, event_date, price, available_seats, status)
    VALUES
        (1, 'Cloud Native Summit', 'Main Auditorium', '2026-06-15T18:00:00Z', 1499.00, 100, 'ACTIVE'),
        (2, 'Distributed Systems Workshop', 'Tech Park Hall B', '2026-07-05T10:00:00Z', 999.00, 60, 'ACTIVE'),
        (3, 'LivePass Music Night', 'Open Air Arena', '2026-08-20T19:30:00Z', 799.00, 250, 'ACTIVE'),
        (4, 'Database Scaling Bootcamp', 'Innovation Center', '2026-09-12T09:30:00Z', 1299.00, 40, 'ACTIVE'),
        (5, 'Legacy Event Cancelled', 'City Convention Center', '2026-10-01T17:00:00Z', 499.00, 80, 'CANCELLED')
    ON CONFLICT (id) DO UPDATE SET
        name = EXCLUDED.name,
        venue = EXCLUDED.venue,
        event_date = EXCLUDED.event_date,
        price = EXCLUDED.price,
        available_seats = EXCLUDED.available_seats,
        status = EXCLUDED.status;

    SELECT setval('events_id_seq', (SELECT MAX(id) FROM events));
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: booking-postgres-init
  labels:
    app: booking-postgres
data:
  01_schema.sql: |
    DO $$
    BEGIN
        IF NOT EXISTS (SELECT 1 FROM pg_type WHERE typname = 'booking_status') THEN
            CREATE TYPE booking_status AS ENUM ('CONFIRMED', 'FAILED');
        END IF;
    END
    $$;

    CREATE TABLE IF NOT EXISTS bookings (
        id SERIAL PRIMARY KEY,
        user_id INTEGER NOT NULL,
        event_id INTEGER NOT NULL,
        tickets INTEGER NOT NULL CHECK (tickets > 0),
        total_price DOUBLE PRECISION NOT NULL CHECK (total_price >= 0),
        status booking_status NOT NULL DEFAULT 'CONFIRMED',
        created_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT CURRENT_TIMESTAMP
    );

    CREATE INDEX IF NOT EXISTS ix_bookings_user_id ON bookings (user_id);
    CREATE INDEX IF NOT EXISTS ix_bookings_event_id ON bookings (event_id);
    CREATE INDEX IF NOT EXISTS ix_bookings_status ON bookings (status);
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: event-postgres-data
  labels:
    app: event-postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: booking-postgres-data
  labels:
    app: booking-postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-postgres
  labels:
    app: event-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-postgres
  template:
    metadata:
      labels:
        app: event-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: livepass
            - name: POSTGRES_PASSWORD
              value: livepass
            - name: POSTGRES_DB
              value: livepass_events
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - livepass
                - -d
                - livepass_events
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - livepass
                - -d
                - livepass_events
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: event-postgres-data
              mountPath: /var/lib/postgresql/data
            - name: event-postgres-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: event-postgres-data
          persistentVolumeClaim:
            claimName: event-postgres-data
        - name: event-postgres-init
          configMap:
            name: event-postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: event-postgres
  labels:
    app: event-postgres
spec:
  type: ClusterIP
  selector:
    app: event-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
